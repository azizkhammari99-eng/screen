<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎥 ScreenShare Pro - مشاركة الشاشة لحظياً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131f;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --success: #00b894;
            --danger: #ff4757;
            --warning: #ffa502;
            --info: #70a1ff;
            --border: #2c2c3e;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --border: #ddd;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(108, 99, 255, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .room-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            animation: fadeIn 0.5s ease;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .video-box {
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .video-box video {
            width: 100%;
            background: #000;
            height: auto;
            max-height: 450px;
        }

        .video-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .video-controls .btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .quality-selector {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 10;
        }

        .quality-selector select {
            width: auto;
            padding: 4px 8px;
            font-size: 12px;
        }

        .chat-section {
            background: var(--bg-card);
            border-radius: 15px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            height: 250px;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: 10px;
            word-break: break-word;
        }

        .message-user {
            font-weight: bold;
            color: var(--accent);
        }

        .message-system {
            color: var(--warning);
            font-style: italic;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .chat-input-area input {
            flex: 1;
        }

        .stats-bar {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat {
            display: flex;
            gap: 5px;
            font-size: 13px;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: bold;
            color: var(--accent);
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-good { background: var(--success); color: white; }
        .status-poor { background: var(--warning); color: white; }
        .status-bad { background: var(--danger); color: white; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
            }
            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            .video-controls .btn {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">🎥 ScreenShare Pro</div>
            <div class="controls-bar">
                <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙 داكن</button>
                <button class="btn" id="copyRoomBtn" style="display:none;" onclick="copyRoomLink()">🔗 نسخ الرابط</button>
                <button class="btn btn-danger" id="leaveBtn" style="display:none;" onclick="leaveRoom()">🚪 مغادرة</button>
            </div>
        </div>

        <div id="statsBar" class="stats-bar" style="display:none;">
            <div class="stat"><span class="stat-label">👥 المتصلين:</span><span class="stat-value" id="viewerCount">0</span></div>
            <div class="stat"><span class="stat-label">🎬 الجودة:</span><span class="stat-value" id="qualityDisplay">720p</span></div>
            <div class="stat"><span class="stat-label">⚡ FPS:</span><span class="stat-value" id="fpsDisplay">0</span></div>
            <div class="stat"><span class="stat-label">📡 البنغ:</span><span class="stat-value" id="pingDisplay">0</span><span>ms</span></div>
            <div class="stat"><span class="stat-label">🔗 الحالة:</span><span class="connection-status status-good" id="connectionStatus">متصل</span></div>
        </div>

        <div id="roomSection" class="room-section">
            <div class="card">
                <h2 style="margin-bottom: 20px;">🎮 مشاركة الشاشة</h2>
                <div class="input-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="userName" placeholder="أدخل اسمك" value="مستخدم">
                </div>
                <div class="input-group">
                    <label>🔐 كلمة المرور (اختياري)</label>
                    <input type="text" id="roomPassword" placeholder="اترك فارغاً">
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="createRoom()">➕ إنشاء غرفة</button>
                    <input type="text" id="joinRoomCode" placeholder="رمز الغرفة" style="flex:1;">
                    <button class="btn" onclick="joinRoom()">🔗 انضمام</button>
                </div>
            </div>
        </div>

        <div id="streamingSection" style="display:none;">
            <div class="video-container">
                <div class="video-box">
                    <video id="screenVideo" autoplay playsinline muted></video>
                    <div class="quality-selector">
                        <select id="qualitySelect" onchange="changeQuality()">
                            <option value="144">144p</option><option value="240">240p</option>
                            <option value="360">360p</option><option value="480">480p</option>
                            <option value="720" selected>720p</option><option value="1080">1080p</option>
                        </select>
                    </div>
                    <div class="video-controls">
                        <button class="btn" onclick="toggleAudio()">🔊 الصوت</button>
                        <button class="btn" onclick="toggleMicrophone()">🎤 الميكروفون</button>
                        <button class="btn" onclick="toggleFullscreen('screenVideo')">🖥️ ملء</button>
                        <button class="btn btn-primary" id="shareBtn" onclick="startScreenShare()">📺 مشاركة</button>
                        <button class="btn" onclick="startCamera()">📷 كاميرا</button>
                        <button class="btn btn-success" onclick="startRecording()">🔴 تسجيل</button>
                    </div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-controls">
                        <button class="btn" onclick="toggleRemoteAudio()">🔇 كتم البعيد</button>
                        <button class="btn" onclick="toggleFullscreen('remoteVideo')">🖥️ ملء</button>
                    </div>
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-header">
                    <span>💬 دردشة مباشرة</span>
                    <span id="onlineUsers">0 متصل</span>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message message-system">✨ مرحباً! يمكنك الدردشة الآن</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-primary" onclick="sendMessage()">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== التكوين الأساسي ====================
        let peerConnection = null;
        let localStream = null;
        let screenStream = null;
        let currentRoom = null;
        let currentUser = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let pingInterval = null;
        
        // خادم الإشارات المجاني (Signal Server)
        // نستخدم PeerJS كبديل بسيط بدون خادم خلفي
        // أو نستخدم WebRTC مباشرة مع STUN servers
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { urls: 'stun:stun.relay.metered.ca:80' }
            ]
        };
        
        // تخزين الاتصالات المحلية (لمستخدم واحد فقط للمشاركة)
        let remoteStream = null;
        
        // ==================== إنشاء الغرفة (محلياً باستخدام معرف فريد) ====================
        function createRoom() {
            const userName = document.getElementById('userName').value.trim();
            const password = document.getElementById('roomPassword').value;
            
            if (!userName) {
                showToast('الرجاء إدخال اسم المستخدم', 'error');
                return;
            }
            
            const roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            currentRoom = roomCode;
            currentUser = userName;
            
            // تخزين كلمة المرور
            if (password) {
                sessionStorage.setItem(`room_${roomCode}_pass`, password);
            }
            
            enterRoom(roomCode);
            showToast(`✅ تم إنشاء الغرفة: ${roomCode}`, 'success');
            
            // تحديث الرابط
            updateRoomUrl(roomCode);
        }
        
        function joinRoom() {
            const roomCode = document.getElementById('joinRoomCode').value.trim().toUpperCase();
            const userName = document.getElementById('userName').value.trim();
            const password = document.getElementById('roomPassword').value;
            
            if (!roomCode || !userName) {
                showToast('الرجاء إدخال رمز الغرفة واسم المستخدم', 'error');
                return;
            }
            
            // التحقق من كلمة المرور المخزنة
            const savedPass = sessionStorage.getItem(`room_${roomCode}_pass`);
            if (savedPass && savedPass !== password) {
                showToast('🔐 كلمة المرور غير صحيحة', 'error');
                return;
            }
            
            currentRoom = roomCode;
            currentUser = userName;
            
            enterRoom(roomCode);
            showToast(`✅ تم الانضمام إلى الغرفة: ${roomCode}`, 'success');
        }
        
        function enterRoom(roomId) {
            document.getElementById('roomSection').style.display = 'none';
            document.getElementById('streamingSection').style.display = 'block';
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('copyRoomBtn').style.display = 'inline-block';
            document.getElementById('leaveBtn').style.display = 'inline-block';
            
            document.getElementById('onlineUsers').innerText = '1 متصل';
            document.getElementById('viewerCount').innerText = '1';
            
            initPeerConnection();
            startPing();
            startFPSMonitor();
        }
        
        function initPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('ICE Candidate:', event.candidate);
                    // في التطبيق البسيط، نستخدم localStorage لنقل الإشارات
                    signalLocal(event.candidate);
                }
            };
            
            peerConnection.ontrack = (event) => {
                console.log('Received remote track');
                remoteStream = event.streams[0];
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                showToast('📡 تم استقبال البث', 'success');
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateConnectionStatus('good');
                } else if (peerConnection.connectionState === 'disconnected') {
                    updateConnectionStatus('poor');
                }
            };
        }
        
        // نظام إشارات بسيط باستخدام localStorage و event listeners
        function signalLocal(data) {
            const key = `webrtc_signal_${currentRoom}`;
            const signal = {
                from: currentUser,
                data: data,
                timestamp: Date.now(),
                type: data.type || 'candidate'
            };
            
            // تخزين الإشارة
            let signals = JSON.parse(localStorage.getItem(key) || '[]');
            signals.push(signal);
            localStorage.setItem(key, JSON.stringify(signals));
            
            // تشغيل حدث مخصص
            window.dispatchEvent(new CustomEvent('signal-update', { detail: { room: currentRoom } }));
        }
        
        function listenForSignals() {
            const key = `webrtc_signal_${currentRoom}`;
            const checkSignals = () => {
                const signals = JSON.parse(localStorage.getItem(key) || '[]');
                if (signals.length > 0) {
                    signals.forEach(signal => {
                        if (signal.from !== currentUser) {
                            handleSignal(signal.data);
                        }
                    });
                    // مسح الإشارات بعد المعالجة
                    localStorage.setItem(key, '[]');
                }
            };
            
            setInterval(checkSignals, 1000);
            
            window.addEventListener('signal-update', (e) => {
                if (e.detail.room === currentRoom) {
                    checkSignals();
                }
            });
        }
        
        function handleSignal(data) {
            if (!peerConnection) return;
            
            if (data.type === 'offer') {
                handleOffer(data);
            } else if (data.type === 'answer') {
                handleAnswer(data);
            } else if (data.candidate) {
                peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.log(e));
            }
        }
        
        async function startScreenShare() {
            try {
                const constraints = {
                    video: { cursor: 'always', displaySurface: 'monitor' },
                    audio: { echoCancellation: true, noiseSuppression: true }
                };
                
                screenStream = await navigator.mediaDevices.getDisplayMedia(constraints);
                localStream = screenStream;
                
                // إضافة المسارات إلى peer connection
                screenStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, screenStream);
                });
                
                const screenVideo = document.getElementById('screenVideo');
                screenVideo.srcObject = screenStream;
                
                // إنشاء Offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // إرسال الإشارة
                signalLocal({ type: 'offer', offer: offer });
                
                showToast('🎥 جاري مشاركة الشاشة...', 'success');
                
                screenStream.getVideoTracks()[0].onended = () => {
                    stopScreenShare();
                };
                
            } catch (error) {
                showToast('⚠️ فشل مشاركة الشاشة: ' + error.message, 'error');
            }
        }
        
        function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            const screenVideo = document.getElementById('screenVideo');
            screenVideo.srcObject = null;
            showToast('⏹️ توقفت المشاركة', 'info');
        }
        
        async function handleOffer(data) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            signalLocal({ type: 'answer', answer: answer });
        }
        
        async function handleAnswer(data) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
        
        function changeQuality() {
            const quality = document.getElementById('qualitySelect').value;
            document.getElementById('qualityDisplay').innerText = quality + 'p';
            
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    const width = parseInt(quality) * (16/9);
                    videoTrack.applyConstraints({
                        width: { ideal: width, max: width },
                        height: { ideal: parseInt(quality), max: parseInt(quality) }
                    });
                }
            }
            showToast(`🎬 الجودة: ${quality}p`, 'success');
        }
        
        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    showToast(audioTrack.enabled ? '🔊 صوت مفعل' : '🔇 صوت مكتوم', 'info');
                }
            }
        }
        
        async function toggleMicrophone() {
            try {
                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioTrack = micStream.getAudioTracks()[0];
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const existingAudio = senders.find(s => s.track && s.track.kind === 'audio');
                    if (existingAudio) {
                        existingAudio.replaceTrack(audioTrack);
                    } else {
                        peerConnection.addTrack(audioTrack, micStream);
                    }
                    showToast('🎤 ميكروفون مفعل', 'success');
                }
            } catch (error) {
                showToast('⚠️ لا يمكن الوصول للميكروفون', 'error');
            }
        }
        
        async function startCamera() {
            try {
                const cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: false
                });
                const videoTrack = cameraStream.getVideoTracks()[0];
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const existingVideo = senders.find(s => s.track && s.track.kind === 'video');
                    if (existingVideo) {
                        existingVideo.replaceTrack(videoTrack);
                    } else {
                        peerConnection.addTrack(videoTrack, cameraStream);
                    }
                    showToast('📷 كاميرا مفعلة', 'success');
                }
            } catch (error) {
                showToast('⚠️ لا يمكن الوصول للكاميرا', 'error');
            }
        }
        
        function toggleFullscreen(elementId) {
            const elem = document.getElementById(elementId);
            if (elem.requestFullscreen) elem.requestFullscreen();
        }
        
        function toggleRemoteAudio() {
            const remoteVideo = document.getElementById('remoteVideo');
            remoteVideo.muted = !remoteVideo.muted;
            showToast(remoteVideo.muted ? '🔇 تم كتم البعيد' : '🔊 تشغيل البعيد', 'info');
        }
        
        function startRecording() {
            if (localStream && !mediaRecorder) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(localStream);
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `recording-${Date.now()}.mp4`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('💾 تم حفظ التسجيل', 'success');
                };
                mediaRecorder.start(1000);
                showToast('🔴 جاري التسجيل...', 'info');
            } else if (mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder = null;
                showToast('⏹️ توقف التسجيل', 'info');
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message) {
                addChatMessage(currentUser, message);
                // تخزين الرسائل للمستخدمين الآخرين
                const chatKey = `chat_${currentRoom}`;
                const chats = JSON.parse(localStorage.getItem(chatKey) || '[]');
                chats.push({ user: currentUser, message: message, time: Date.now() });
                localStorage.setItem(chatKey, JSON.stringify(chats));
                input.value = '';
            }
        }
        
        function addChatMessage(user, message, isSystem = false) {
            const chatDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = isSystem ? 'message message-system' : 'message';
            msgDiv.innerHTML = isSystem ? `📢 ${message}` : `<span class="message-user">${user}:</span> ${message}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        function loadChatHistory() {
            const chatKey = `chat_${currentRoom}`;
            const chats = JSON.parse(localStorage.getItem(chatKey) || '[]');
            chats.forEach(chat => {
                addChatMessage(chat.user, chat.message);
            });
            
            // مراقبة الرسائل الجديدة
            setInterval(() => {
                const newChats = JSON.parse(localStorage.getItem(chatKey) || '[]');
                if (newChats.length > chats.length) {
                    const newOnes = newChats.slice(chats.length);
                    newOnes.forEach(chat => {
                        if (chat.user !== currentUser) {
                            addChatMessage(chat.user, chat.message);
                        }
                    });
                    chats.length = 0;
                    chats.push(...newChats);
                }
            }, 1000);
        }
        
        function copyRoomLink() {
            const link = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
            navigator.clipboard.writeText(link);
            showToast('🔗 تم نسخ الرابط', 'success');
        }
        
        function leaveRoom() {
            stopScreenShare();
            if (peerConnection) peerConnection.close();
            peerConnection = null;
            
            document.getElementById('roomSection').style.display = 'flex';
            document.getElementById('streamingSection').style.display = 'none';
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('copyRoomBtn').style.display = 'none';
            document.getElementById('leaveBtn').style.display = 'none';
            
            currentRoom = null;
            showToast('👋 تم مغادرة الغرفة', 'info');
        }
        
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeBtn');
            btn.innerText = document.body.classList.contains('light') ? '🌙 داكن' : '☀️ فاتح';
        }
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function updateConnectionStatus(status) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = `connection-status status-${status}`;
            statusDiv.innerText = status === 'good' ? 'ممتاز' : status === 'poor' ? 'متوسط' : 'ضعيف';
        }
        
        function startPing() {
            if (pingInterval) clearInterval(pingInterval);
            let lastPing = Date.now();
            pingInterval = setInterval(() => {
                const now = Date.now();
                const latency = now - lastPing;
                document.getElementById('pingDisplay').innerText = Math.min(latency, 200);
                updateConnectionStatus(latency < 100 ? 'good' : latency < 200 ? 'poor' : 'bad');
                lastPing = now;
            }, 2000);
        }
        
        let fpsInterval;
        function startFPSMonitor() {
            let frameCount = 0;
            let lastTime = performance.now();
            if (fpsInterval) clearInterval(fpsInterval);
            fpsInterval = setInterval(() => {
                const now = performance.now();
                const fps = Math.round(frameCount * 1000 / (now - lastTime));
                document.getElementById('fpsDisplay').innerText = Math.min(fps, 60);
                frameCount = 0;
                lastTime = now;
            }, 1000);
            
            function countFrame() {
                frameCount++;
                requestAnimationFrame(countFrame);
            }
            requestAnimationFrame(countFrame);
        }
        
        // تحميل تلقائي للرسائل والإشارات
        function initRoomFeatures() {
            if (currentRoom) {
                listenForSignals();
                loadChatHistory();
            }
        }
        
        // التحقق من رابط الغرفة
        const urlParams = new URLSearchParams(window.location.search);
        const roomParam = urlParams.get('room');
        if (roomParam) {
            document.getElementById('joinRoomCode').value = roomParam;
        }
        
        // مراقبة التغييرات
        setInterval(() => {
            if (currentRoom) {
                // تحديث عدد المشاهدين (محاكاة)
                const viewers = Math.floor(Math.random() * 5) + 1;
                document.getElementById('viewerCount').innerText = viewers;
                document.getElementById('onlineUsers').innerText = `${viewers} متصل`;
            }
        }, 10000);
        
        console.log('🎉 ScreenShare Pro جاهز!');
    </script>
</body>
</html>
